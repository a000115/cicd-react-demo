trigger:
- main

pool:
  name: Default  # Use self-hosted agent

steps:
- task: NodeTool@0
  inputs:
    versionSpec: '20.x'
  displayName: 'Install Node.js'

- script: |
    npm install
    npm run build
  displayName: 'npm install and build'

- script: dir "$(Build.SourcesDirectory)\build"
  displayName: 'Check if build folder exists'

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.SourcesDirectory)/build'
    ArtifactName: 'react-build'
    publishLocation: 'Container'
  displayName: 'Publish React Build Artifact'

- task: AzureWebApp@1
  inputs:
    azureSubscription: 'admin-cicd-1'
    appName: 'cicdcd'
    package: '$(Build.SourcesDirectory)/build'
  displayName: 'Deploy React App to Azure Web App'