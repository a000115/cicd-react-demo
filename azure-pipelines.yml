trigger:
- '*'

variables:
  node_version: '20.x'
  image_name: 'react-cicd-app'

stages:

# ---------------- BUILD ----------------
- stage: Build
  displayName: Build React App
  jobs:
  - job: BuildJob
    pool:
      name: Default

    steps:
    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: $(node_version)
      displayName: Install Node.js

    - script: npm install
      displayName: Install dependencies

    # Try both CRA and Vite builds safely
    - script: |
        npm run build || npm run build:prod
      displayName: Build application

    # Detect build folder and copy it safely
    - script: |
        if exist build (
          echo Using build folder
          robocopy build "$(Build.ArtifactStagingDirectory)/build" /E
        ) else if exist dist (
          echo Using dist folder
          robocopy dist "$(Build.ArtifactStagingDirectory)/build" /E
        ) else (
          echo Build folder not found!
          exit 1
        )
      displayName: Prepare build artifacts

    - task: ArchiveFiles@2
      inputs:
        rootFolderOrFile: '$(Build.ArtifactStagingDirectory)/build'
        includeRootFolder: false
        archiveType: zip
        archiveFile: '$(Build.ArtifactStagingDirectory)/react-build.zip'
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      inputs:
        targetPath: '$(Build.ArtifactStagingDirectory)/react-build.zip'
        artifact: react-build

# ---------------- APPROVAL ----------------
- stage: CI_Approval
  displayName: Approval
  dependsOn: Build
  jobs:
  - job: ApprovalJob
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 30
      inputs:
        instructions: 'Approve deployment'
        onTimeout: reject

# ---------------- DEPLOY DEV ----------------
- stage: Deploy_DEV
  dependsOn: CI_Approval
  jobs:
  - deployment: DeployDev
    environment: dev-cicd
    pool:
      name: Default

    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'cicd-react-abhishek'
              appType: webApp
              appName: dev-cicd
              package: '$(Pipeline.Workspace)/react-build/react-build.zip'

# ---------------- DEPLOY UAT ----------------
- stage: Deploy_UAT
  dependsOn: Deploy_DEV
  jobs:
  - deployment: DeployUAT
    environment: uat-cicd
    pool:
      name: Default

    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'cicd-react-abhishek'
              appType: webApp
              appName: uat-cicd
              package: '$(Pipeline.Workspace)/react-build/react-build.zip'

# ---------------- DEPLOY PROD ----------------
- stage: Deploy_PROD
  dependsOn: Deploy_UAT
  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
  jobs:
  - deployment: DeployProd
    environment: production
    pool:
      name: Default

    strategy:
      runOnce:
        deploy:
          steps:
          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            inputs:
              azureSubscription: 'cicd-react-abhishek'
              appType: webApp
              appName: ciabhi
              package: '$(Pipeline.Workspace)/react-build/react-build.zip'