trigger:
- main

variables:
  node_version: '20.x'
  source_dir: '$(System.DefaultWorkingDirectory)'
  build_dir: '$(System.DefaultWorkingDirectory)/build'

stages:

# ---------------- BUILD STAGE ----------------
- stage: Build
  displayName: Build React App

  jobs:
  - job: BuildJob
    pool:
      name: Default

    steps:

    - checkout: self

    # Install Node
    - task: NodeTool@0
      displayName: Install Node.js
      inputs:
        versionSpec: $(node_version)

    # Install dependencies
    - script: npm install
      workingDirectory: $(source_dir)
      displayName: Install npm packages

    # Build React app
    - script: npm run build
      workingDirectory: $(source_dir)
      displayName: Build React App

    # Archive build
    - task: ArchiveFiles@2
      displayName: Zip build folder
      inputs:
        rootFolderOrFile: $(build_dir)
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/react-build.zip
        replaceExistingArchive: true

    # Publish artifact
    - task: PublishPipelineArtifact@1
      displayName: Publish Artifact
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)/react-build.zip
        artifact: react-build


# ---------------- CI APPROVAL ----------------
- stage: CI_Approval
  displayName: CI Approval Gate
  dependsOn: Build

  jobs:
  - job: WaitForApproval
    displayName: Waiting for CI Approval
    pool: server

    steps:
    - task: ManualValidation@0
      inputs:
        notifyUsers: 'Manoj.Kumar@ifi.tech'
        instructions: 'Build completed. Please approve to start deployment pipeline.'
        onTimeout: 'reject'


# ---------------- DEV DEPLOY ----------------
- stage: Deploy_DEV
  displayName: Deploy to DEV
  dependsOn: CI_Approval

  jobs:
  - deployment: DeployDev
    environment: dev-cicd
    pool:
      name: Default

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            displayName: Deploy to DEV Web App
            inputs:
              azureSubscription: CICD-service-connection
              appType: webApp
              appName: dev-cicd
              package: $(Pipeline.Workspace)/react-build/react-build.zip


# ---------------- UAT DEPLOY ----------------
- stage: Deploy_UAT
  displayName: Deploy to UAT
  dependsOn: Deploy_DEV

  jobs:
  - deployment: DeployUAT
    environment: uat-cicd
    pool:
      name: Default

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            displayName: Deploy to UAT Web App
            inputs:
              azureSubscription: CICD-service-connection
              appType: webApp
              appName: uat-cicd
              package: $(Pipeline.Workspace)/react-build/react-build.zip


# ---------------- PROD DEPLOY ----------------
- stage: Deploy_PROD
  displayName: Deploy to Production
  dependsOn: Deploy_UAT

  jobs:
  - deployment: DeployProd
    environment: production
    pool:
      name: Default

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            displayName: Deploy to Production Web App
            inputs:
              azureSubscription: CICD-service-connection
              appType: webApp
              appName: ciabhi
              package: $(Pipeline.Workspace)/react-build/react-build.zip