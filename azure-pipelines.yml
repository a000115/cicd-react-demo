trigger:
  - main

variables:
  node_version: '20.x'
  source_dir: '$(System.DefaultWorkingDirectory)'
  build_dir: '$(System.DefaultWorkingDirectory)/build'

stages:

# 1️⃣ Build Stage (CI)
- stage: Build
  displayName: 'Build React App'
  jobs:
  - job: BuildJob
    pool:
      name: Default
    steps:

      # Checkout code
      - checkout: self
        displayName: 'Checkout repository'

      # Install Node.js
      - task: NodeTool@0
        inputs:
          versionSpec: '$(node_version)'
        displayName: 'Install Node.js'

      # Install npm packages
      - script: npm install
        displayName: 'Install npm packages'
        workingDirectory: '$(source_dir)'

      # Build React app
      - script: npm run build
        displayName: 'Build React app'
        workingDirectory: '$(source_dir)'

      # Check build folder exists
      - powershell: |
          Write-Host "Checking build folder..."
          if (Test-Path '$(build_dir)') {
              Write-Host "✅ Build folder exists."
          } else {
              Write-Warning "⚠️ Build folder not found. Skipping artifact publish."
              exit 0
          }
        displayName: 'Check build folder exists'

      # Publish build artifact
      - task: PublishPipelineArtifact@1
        condition: succeededOrFailed()
        inputs:
          targetPath: '$(build_dir)'
          artifact: 'react-build'
          publishLocation: 'pipeline'
        displayName: 'Publish build artifact'

# 2️⃣ Deploy Stage (CD)
- stage: Deploy
  displayName: 'Deploy React App to Azure Web App'
  dependsOn: Build
  jobs:
  - deployment: DeployJob
    displayName: 'Deploy React App'
    environment: 'production'  # optional, helps track deployments
    pool:
      name: Default
    strategy:
      runOnce:
        deploy:
          steps:

            # 1️⃣ Download the build artifact
            - download: current
              artifact: 'react-build'

            # 2️⃣ Deploy to Azure Web App
            - task: AzureWebApp@1
              inputs:
                azureSubscription: 'admin-cicd-1'   # your service connection
                appType: 'webAppLinux'
                appName: 'cicdcd'
                package: '$(Pipeline.Workspace)/react-build'