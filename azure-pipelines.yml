trigger:
- main

pool:
  name: Default  # your self-hosted agent pool
  vmImage: 'windows-latest'

variables:
  node_version: '20.x'
  source_dir: '$(System.DefaultWorkingDirectory)'  # fallback if Build.SourcesDirectory missing
  build_dir: '$(System.DefaultWorkingDirectory)\build'

steps:

# 1️⃣ Checkout code
- task: Checkout@1
  displayName: 'Checkout repository'

# 2️⃣ Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '$(node_version)'
  displayName: 'Install Node.js'

# 3️⃣ Install npm packages
- script: npm install
  displayName: 'Install npm packages'
  workingDirectory: '$(source_dir)'

# 4️⃣ Build React app
- script: npm run build
  displayName: 'Build React app'
  workingDirectory: '$(source_dir)'

# 5️⃣ Check build folder exists
- powershell: |
    if (Test-Path "$(build_dir)") {
      Write-Host "✅ Build folder exists."
    } else {
      Write-Error "❌ Build folder not found!"
    }
  displayName: 'Check build folder exists'

# 6️⃣ Publish build artifact
- task: PublishPipelineArtifact@1
  inputs:
    targetPath: '$(build_dir)'
    artifact: 'react-build'
    publishLocation: 'pipeline'
  displayName: 'Publish build artifact'