trigger:
- '*'

variables:
  node_version: '20.x'
  source_dir: '$(System.DefaultWorkingDirectory)'
  build_dir: '$(System.DefaultWorkingDirectory)/build'

stages:

# ---------------- BUILD STAGE ----------------
- stage: Build
  displayName: Build React App
  jobs:
  - job: BuildJob
    pool:
      name: Default

    steps:
    - checkout: self

    - task: NodeTool@0
      inputs:
        versionSpec: $(node_version)
      displayName: Install Node.js

    - script: npm install
      workingDirectory: $(source_dir)
      displayName: Install npm packages

    - script: npm run build
      workingDirectory: $(source_dir)
      displayName: Build React app

    - task: ArchiveFiles@2
      displayName: Zip build folder
      inputs:
        rootFolderOrFile: $(build_dir)
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/react-build.zip
        replaceExistingArchive: true

    - task: PublishPipelineArtifact@1
      displayName: Publish artifact
      inputs:
        targetPath: $(Build.ArtifactStagingDirectory)/react-build.zip
        artifact: react-build


# ---------------- CI APPROVAL ----------------
- stage: CI_Approval
  displayName: CI Approval
  dependsOn: Build
  jobs:
  - job: WaitForApproval
    pool: server
    steps:
    - task: ManualValidation@0
      timeoutInMinutes: 5
      inputs:
        notifyUsers: |
          Manoj.Kumar@ifi.tech
        instructions: 'Please approve to continue deployment to DEV.'
        onTimeout: reject


# ---------------- DEV DEPLOY ----------------
- stage: Deploy_DEV
  displayName: Deploy to DEV
  dependsOn: CI_Approval
  jobs:
  - deployment: DeployDev
    environment: dev-cicd
    pool:
      name: Default

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            displayName: Deploy to DEV Web App
            inputs:
              azureSubscription: CICD-service-connection
              appType: webApp
              appName: dev-cicd
              package: $(Pipeline.Workspace)/react-build/react-build.zip


# ---------------- UAT DEPLOY ----------------
- stage: Deploy_UAT
  displayName: Deploy to UAT
  dependsOn: Deploy_DEV
  jobs:
  - deployment: DeployUAT
    environment: uat-cicd
    pool:
      name: Default

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            displayName: Deploy to UAT Web App
            inputs:
              azureSubscription: CICD-service-connection
              appType: webApp
              appName: uat-cicd
              package: $(Pipeline.Workspace)/react-build/react-build.zip


# ---------------- PROD DEPLOY ----------------
- stage: Deploy_PROD
  displayName: Deploy to Production
  dependsOn: Deploy_UAT

  condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))

  jobs:
  - deployment: DeployProd
    environment: production
    pool:
      name: Default

    strategy:
      runOnce:
        deploy:
          steps:

          - download: current
            artifact: react-build

          - task: AzureWebApp@1
            displayName: Deploy to PROD Web App
            inputs:
              azureSubscription: CICD-service-connection
              appType: webApp
              appName: ciabhi
              package: $(Pipeline.Workspace)/react-build/react-build.zip