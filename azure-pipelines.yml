trigger:
- main

pool:
  name: Default  # Your self-hosted agent pool
  vmImage: 'windows-latest'

variables:
  node_version: '20.x'

steps:

# 1️⃣ Checkout code
- task: Checkout@1
  displayName: 'Checkout repository'

# 2️⃣ Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '$(node_version)'
  displayName: 'Install Node.js'

# 3️⃣ Install npm packages
- script: |
    npm install
  displayName: 'Install npm packages'
  workingDirectory: '$(Build.SourcesDirectory)'

# 4️⃣ Build React app
- script: |
    npm run build
  displayName: 'Build React app'
  workingDirectory: '$(Build.SourcesDirectory)'

# 5️⃣ Check build folder exists (PowerShell safe check)
- powershell: |
    if (Test-Path "$(Build.SourcesDirectory)\build") {
      Write-Host "✅ Build folder exists."
    } else {
      Write-Error "❌ Build folder not found!"
    }
  displayName: 'Check build folder exists'

# 6️⃣ Publish build artifact
- task: PublishPipelineArtifact@1
  inputs:
    targetPath: '$(Build.SourcesDirectory)\build'
    artifact: 'react-build'
    publishLocation: 'pipeline'
  displayName: 'Publish build artifact'