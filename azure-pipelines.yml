trigger:
  - main

pool:
  name: Default  # your self-hosted agent pool

variables:
  node_version: '20.x'
  source_dir: '$(System.DefaultWorkingDirectory)'
  build_dir: '$(System.DefaultWorkingDirectory)/build'  # use forward slash to avoid escape issues

steps:

# 1️⃣ Checkout code
- checkout: self
  displayName: 'Checkout repository'

# 2️⃣ Install Node.js
- task: NodeTool@0
  inputs:
    versionSpec: '$(node_version)'
  displayName: 'Install Node.js'

# 3️⃣ Install npm packages
- script: npm install
  displayName: 'Install npm packages'
  workingDirectory: '$(source_dir)'

# 4️⃣ Build React app
- script: npm run build
  displayName: 'Build React app'
  workingDirectory: '$(source_dir)'

# 5️⃣ Check build folder exists (safe)
- powershell: |
    Write-Host "Checking build folder..."
    if (Test-Path '$(build_dir)') {
        Write-Host "✅ Build folder exists."
    } else {
        Write-Warning "⚠️ Build folder not found. Skipping artifact publish."
        exit 0
    }
  displayName: 'Check build folder exists'

# 6️⃣ Publish build artifact (only if folder exists)
- task: PublishPipelineArtifact@1
  condition: succeededOrFailed()
  inputs:
    targetPath: '$(build_dir)'
    artifact: 'react-build'
    publishLocation: 'pipeline'
  displayName: 'Publish build artifact'